rules:
  - id: aws-key
    message: Possible AWS access key hardcoded in source
    severity: ERROR
    languages:
      - python
    pattern-regex: AKIA[0-9A-Z]{16}
    metadata:
      type: secret

  - id: hardcoded-password
    message: Hardcoded password found in source code
    severity: ERROR
    languages:
      - python
    pattern-regex: (?i)\b(password|passwd|pwd|db_password)\b\s*=\s*["'][^"']{4,}["']
    metadata:
      type: credential
