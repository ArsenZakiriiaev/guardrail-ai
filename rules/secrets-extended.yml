rules:
  - id: hardcoded-api-token
    message: Hardcoded API token found in source code
    severity: ERROR
    languages:
      - python
    pattern-regex: (?i)\b(api_key|api_token|access_token)\b\s*=\s*["'][^"']{8,}["']
    metadata:
      type: credential

  - id: github-token
    message: Possible GitHub token hardcoded in source
    severity: ERROR
    languages:
      - python
    pattern-regex: ghp_[A-Za-z0-9]{36}
    metadata:
      type: secret

  - id: slack-token
    message: Possible Slack token hardcoded in source
    severity: ERROR
    languages:
      - python
    pattern-regex: xox[baprs]-[A-Za-z0-9-]{10,80}
    metadata:
      type: secret

  - id: private-key
    message: Private key material found in source code
    severity: ERROR
    languages:
      - python
    pattern-regex: '-----BEGIN ([A-Z ]+)?PRIVATE KEY-----'
    metadata:
      type: secret
